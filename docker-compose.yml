# OTS relay API — stamps via public upstream calendars. No Bitcoin node required.
#
#   docker compose up -d
#
# Optional: set OTS_CALENDARS to override default public calendars.
# Optional: set BTC_RPC_* env vars and pass bitcoin flags for confirmed verify.

services:
  ots:
    build: .
    ports:
      - "14788:14788"
    environment:
      OTS_CALENDARS: ${OTS_CALENDARS:-https://alice.btc.calendar.opentimestamps.org,https://bob.btc.calendar.opentimestamps.org,https://finney.calendar.eternitywall.com}
    restart: unless-stopped
